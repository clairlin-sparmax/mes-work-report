<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A I S P 報工系統</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>A I S P 報工系統</h1>
      <p id="dataset-info">生產報工資料檔：未指定（請由 QR Code 連結帶入）</p>
    </header>

    <section class="card">
      <h2>建立報工紀錄</h2>
      <form id="report-form">
        <label>報工人員
          <select id="worker" required>
            <option value="">請選擇人員</option>
            <option>王小明</option>
            <option>李佳穎</option>
            <option>陳志豪</option>
            <option>林宥廷</option>
          </select>
        </label>

        <label>報工數量
          <input type="number" id="quantity" min="1" step="1" placeholder="輸入生產數量" required />
        </label>

        <label>開始時間
          <input type="datetime-local" id="start-time" required />
        </label>

        <label>結束時間
          <input type="datetime-local" id="end-time" required />
        </label>

        <button type="submit">送出報工</button>
      </form>
    </section>

    <section class="card">
      <h2>報工紀錄預覽</h2>
      <table>
        <thead>
          <tr>
            <th>資料檔</th>
            <th>人員</th>
            <th>數量</th>
            <th>開始</th>
            <th>結束</th>
            <th>建立時間</th>
          </tr>
        </thead>
        <tbody id="records"></tbody>
      </table>
    </section>

    <footer>
      <p>手機/平板掃碼方式：將 QR Code 指向 <code>https://your-domain.example/?dataset=LINE01-A</code></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
